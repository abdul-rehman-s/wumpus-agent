<!DOCTYPE html>
<html>
<head>
    <title>Wumpus Agent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        h2 {
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 5px;
            margin-bottom: 15px;
        }
        .cell {
            width: 70px;
            height: 70px;
            text-align: center;
            line-height: 70px;
            border: 1px solid #444;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
        }
        #info {
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        #status-msg {
            font-size: 20px;
            font-weight: bold;
            color: gold;
            margin-bottom: 15px;
            min-height: 28px;
        }
        #reset-btn {
            padding: 10px 24px;
            font-size: 15px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #reset-btn:hover {
            background: #c73652;
        }
    </style>
</head>
<body>

<h2>Wumpus World Agent</h2>
<div class="grid" id="grid"></div>
<div id="status-msg"></div>
<p id="info"></p>
<button id="reset-btn" onclick="resetAgent()">Reset Agent</button>

<script>
    let interval = null;

    function draw(data) {
        let grid = document.getElementById("grid");
        grid.innerHTML = "";

        for (let r = 4; r >= 1; r--) {
            for (let c = 1; c <= 4; c++) {
                let div = document.createElement("div");
                div.className = "cell";

                if (data.agent[0] === r && data.agent[1] === c) {
                    div.innerHTML = "A";
                    div.style.background = "steelblue";
                } else if (data.pits.some(p => p[0] === r && p[1] === c)) {
                    div.style.background = "red";
                } else if (data.wumpus[0] === r && data.wumpus[1] === c) {
                    div.style.background = "darkred";
                } else if (data.gold[0] === r && data.gold[1] === c) {
                    div.style.background = "gold";
                } else if (data.visited.some(v => v[0] === r && v[1] === c)) {
                    div.style.background = "green";
                } else {
                    div.style.background = "gray";
                }

                grid.appendChild(div);
            }
        }

        document.getElementById("info").innerHTML =
            "Percepts: " + data.percepts +
            "<br>Score: " + data.score +
            "<br>Inference Steps: " + data.inference_steps;

        // Stop polling when gold is found
        if (data.done) {
            clearInterval(interval);
            interval = null;
            document.getElementById("status-msg").innerText = "🏆 Gold Found! Agent Wins!";
        }
    }

    function loop() {
        fetch("/state")
            .then(res => res.json())
            .then(data => draw(data));
    }

    function resetAgent() {
        // Stop current loop
        if (interval) {
            clearInterval(interval);
            interval = null;
        }

        // Clear status message
        document.getElementById("status-msg").innerText = "";

        // Call reset route
        fetch("/reset")
            .then(res => res.json())
            .then(() => {
                // Restart loop
                interval = setInterval(loop, 1000);
            });
    }

    // Start on page load
    interval = setInterval(loop, 1000);
</script>

</body>
</html>
